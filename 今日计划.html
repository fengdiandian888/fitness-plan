<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C4A4A4">
<title>今日计划 · 减脂教练</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<script>window.PAGE_META = { key: 'today', dark: false, title: '今日计划' };</script>

<main class="container">

  <!-- 英雄卡：日期 + 天气 + 今日类型 -->
  <section class="card hero-card" id="heroCard">
    <h1 id="heroTitle">加载中…</h1>
    <div class="hero-sub" id="heroSub">读取天气数据中</div>

    <!-- 天气行 -->
    <div class="weather-row" id="weatherRow" style="display:none;margin-top:8px">
      <span class="wx-emoji" id="wxEmoji">☀️</span>
      <span class="wx-text" id="wxText">—</span>
      <span class="wx-tag" id="wxTag">适合骑行</span>
    </div>

    <!-- 指标网格 -->
    <div class="grid-4" style="margin-top:14px;gap:8px">
      <div class="metric-box primary">
        <span class="metric-val" id="mProtein">100</span>
        <span class="metric-label">蛋白质目标 (g)</span>
      </div>
      <div class="metric-box water">
        <span class="metric-val" id="mWater">2.5L</span>
        <span class="metric-label">每日饮水</span>
      </div>
      <div class="metric-box exercise">
        <span class="metric-val" id="mExercise">90′</span>
        <span class="metric-label">运动时长</span>
      </div>
      <div class="metric-box sleep">
        <span class="metric-val" id="mSleep">7h</span>
        <span class="metric-label">睡眠时间</span>
      </div>
    </div>
  </section>

  <!-- 今日晚餐配比 -->
  <section class="card" id="dinnerCard">
    <div class="flex-between">
      <h3>🍽️ 今日晚餐</h3>
      <span class="badge badge-info" id="dinnerTag">按计划进食</span>
    </div>
    <div class="grid-3" style="gap:8px">
      <div class="metric-box primary">
        <span class="metric-val" id="dinnerProtein">240g</span>
        <span class="metric-label">鸡胸肉 / 牛肉</span>
      </div>
      <div class="metric-box">
        <span class="metric-val" id="dinnerVeg">300g</span>
        <span class="metric-label">黄瓜/菠菜/苋菜</span>
      </div>
      <div class="metric-box">
        <span class="metric-val" id="dinnerCarb">≤50g</span>
        <span class="metric-label">玉米80g / 南瓜200g</span>
      </div>
    </div>
    <div class="hint" style="margin-top:10px">小贴士：进食顺序「蔬菜 → 蛋白质 → 主食」，可减少总体摄入量。</div>
  </section>

  <!-- 今日动作清单 -->
  <section class="card" id="movesCard">
    <div class="flex-between">
      <h3>💪 今日训练动作</h3>
      <span id="movesCount" class="badge badge-primary">0 个动作</span>
    </div>
    <div id="movesList"></div>
    <div id="movesVideo" style="margin-top:10px"></div>
  </section>

  <!-- 倒计时卡片 -->
  <section class="card">
    <h3>⏰ 时间提醒</h3>
    <div id="countdownArea"></div>
  </section>

  <!-- 时间轴 -->
  <section class="card">
    <h3>📅 今日时间轴</h3>
    <div class="tl-scroll">
      <div class="tl-track" id="tlTrack"></div>
    </div>
  </section>

  <!-- 体重趋势 -->
  <section class="card">
    <div class="flex-between">
      <h3>⚖️ 体重趋势</h3>
      <span class="badge" id="weightDelta"></span>
    </div>
    <div class="flex gap-3" style="margin-bottom:10px">
      <input type="number" id="weightInput" placeholder="今日体重 (kg)" step="0.1" style="flex:1">
      <button class="btn btn-primary" id="saveWeightBtn">记录</button>
    </div>
    <div id="weightProgress"></div>
    <canvas class="chart" id="weightChart" width="700" height="220" style="height:220px"></canvas>
    <div class="hint" id="weightStats" style="margin-top:10px">尚未记录数据</div>
  </section>

  <!-- 激励卡片 -->
  <section class="motivation-card" id="motivationCard">
    <div class="motiv-icon" id="motivIcon">🔥</div>
    <div class="motiv-text" id="motivText">加载中…</div>
    <div class="motiv-author" id="motivAuthor"></div>
  </section>



  <div style="text-align:center;color:#9ca3af;font-size:12px;padding:18px 0 0">
    减脂教练 · v2.1 · 数据来自 wttr.in
  </div>
</main>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
(function () {
  const now = new Date();
  const dayIdx = now.getDay();
  const todayKey = FIT.dayKeys[dayIdx];
  const todayLabel = FIT.dayLabels[dayIdx];
  const plan = FIT.plans[todayKey] || FIT.plans.recovery;
  const timeline = FIT.timeline[todayKey] || FIT.timeline.recovery;

  // ============ 英雄卡 ============
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  document.getElementById('heroTitle').textContent =
    yyyy + '年' + mm + '月' + dd + '日 · ' + weekdays[dayIdx];
  document.getElementById('heroSub').innerHTML =
    '今日主题：<b>' + todayLabel + '</b> · 目标体重 ' + FIT.body.targetMin + '–' + FIT.body.targetMax + ' kg';

  document.getElementById('mProtein').textContent = FIT.metrics.protein;
  document.getElementById('mWater').textContent = FIT.metrics.water;
  document.getElementById('mExercise').textContent = FIT.metrics.exercise;
  document.getElementById('mSleep').textContent = FIT.metrics.sleepHours + 'h';

  document.getElementById('dinnerProtein').textContent = FIT.dinner.protein;
  document.getElementById('dinnerVeg').textContent = FIT.dinner.veg;
  document.getElementById('dinnerCarb').textContent = FIT.dinner.carb;

  // ============ 动作清单 ============
  if (plan.moves && plan.moves.length) {
    App.renderMoves('movesList', plan.moves);
    document.getElementById('movesCount').textContent = plan.moves.length + ' 个动作';
  } else {
    document.getElementById('movesCard').style.display = 'none';
  }
  if (plan.main && FIT.vids[plan.main]) {
    const vid = FIT.vids[plan.main];
    const el = document.getElementById('movesVideo');
    el.innerHTML = '<div class="hint">🎥 推荐跟练视频（点击加载）</div>';
    const vidBox = document.createElement('div');
    vidBox.setAttribute('data-bvid', vid.bv);
    vidBox.setAttribute('data-title', vid.title);
    el.appendChild(vidBox);
  }

  // ============ 倒计时卡片 ============
  function updateCountdown() {
    const now = new Date();
    const hour = now.getHours();
    const minute = now.getMinutes();
    
    let nextEvent = null;
    let nextTime = null;
    
    for (const item of timeline) {
      const [h, m] = item.time.split(':').map(Number);
      if (h > hour || (h === hour && m > minute)) {
        nextEvent = item;
        nextTime = new Date();
        nextTime.setHours(h, m, 0, 0);
        break;
      }
    }
    
    const container = document.getElementById('countdownArea');
    
    if (nextEvent) {
      const diff = nextTime - now;
      const hours = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      
      const icons = { food: '🍽️', water: '💧', exercise: '🏋️', move: '🚴', sleep: '🌙', rest: '😴' };
      const icon = icons[nextEvent.type] || '⏰';
      
      container.innerHTML =
        '<div class="countdown-card">' +
          '<span class="countdown-icon">' + icon + '</span>' +
          '<div class="countdown-info">' +
            '<div class="countdown-title">' + nextEvent.text + '</div>' +
            '<div class="countdown-value">' + 
              (hours > 0 ? hours + '小时 ' : '') + mins + '分钟后' +
            '</div>' +
          '</div>' +
        '</div>';
    } else {
      container.innerHTML =
        '<div class="countdown-card">' +
          '<span class="countdown-icon">🌙</span>' +
          '<div class="countdown-info">' +
            '<div class="countdown-title">今日任务已完成，准备休息</div>' +
            '<div class="countdown-value">Good Job!</div>' +
          '</div>' +
        '</div>';
    }
  }
  updateCountdown();
  setInterval(updateCountdown, 60000);

  // ============ 时间轴 ============
  App.renderTimeline('tlTrack', { timeline: timeline }, now);

  // ============ 天气 ============
  fetchWeather(function (d) {
    if (!d) return;
    const cur = d.current_condition && d.current_condition[0];
    if (!cur) return;
    const wxRow = document.getElementById('weatherRow');
    wxRow.style.display = 'flex';
    const code = parseInt(cur.weatherCode);
    document.getElementById('wxEmoji').textContent = wxEmo(code);
    document.getElementById('wxText').textContent =
      cur.temp_C + '°C · ' + cur.weatherDesc[0].value +
      ' · 体感 ' + cur.FeelsLikeC + '°C · 湿度 ' + cur.humidity + '%';

    const tomorrow = extractTomorrow(d);
    let tagText = '适合骑行';
    if (tomorrow && tomorrow.evRain) tagText = '明日傍晚有雨';
    document.getElementById('wxTag').textContent = tagText;
  });

  // ============ 体重 ============
  const WEIGHT_LOG_KEY = 'fit_weight_log';
  let weightLog = [];
  try { weightLog = JSON.parse(localStorage.getItem(WEIGHT_LOG_KEY) || '[]'); } catch (e) { weightLog = []; }

  function renderWeightUI() {
    App.renderWeightProgress('weightProgress', FIT.body.startWeight,
      FIT.body.weight, FIT.body.targetMin, FIT.body.targetMax);
    const chart = weightLog.slice(-14).map(function (e) { return { ts: e.date, w: e.weight }; });
    const canvas = document.getElementById('weightChart');
    if (canvas && App.renderWeightChart) {
      App.renderWeightChart('weightChart', chart, FIT.body.startWeight, FIT.body.targetMin, FIT.body.targetMax);
    }
    const stat = document.getElementById('weightStats');
    const deltaBadge = document.getElementById('weightDelta');
    
    if (weightLog.length === 0) {
      stat.textContent = '尚未记录数据';
      deltaBadge.style.display = 'none';
    } else {
      const first = weightLog[0];
      const last = weightLog[weightLog.length - 1];
      const delta = (last.weight - first.weight).toFixed(1);
      stat.textContent = '共记录 ' + weightLog.length + ' 次 · 起始 ' + first.weight + ' kg → 最新 ' + last.weight + ' kg（' +
        (delta > 0 ? '+' : '') + delta + ' kg）';
      
      if (delta < 0) {
        deltaBadge.className = 'badge badge-info';
        deltaBadge.textContent = '已减 ' + Math.abs(delta) + ' kg';
      } else if (delta > 0) {
        deltaBadge.className = 'badge badge-warn';
        deltaBadge.textContent = '需注意 +' + delta + ' kg';
      } else {
        deltaBadge.style.display = 'none';
        return;
      }
      deltaBadge.style.display = 'inline-flex';
    }
  }
  renderWeightUI();

  document.getElementById('saveWeightBtn').addEventListener('click', function () {
    const v = parseFloat(document.getElementById('weightInput').value);
    if (!v || v < 30 || v > 200) { alert('请输入合理的体重'); return; }
    const todayStr = new Date().toISOString().slice(0, 10);
    weightLog.push({ date: todayStr, weight: v });
    try { localStorage.setItem(WEIGHT_LOG_KEY, JSON.stringify(weightLog)); } catch (e) {}
    document.getElementById('weightInput').value = '';
    App.toast('已记录 ' + v + ' kg');
    renderWeightUI();
  });

  // ============ 激励卡片 ============
  const motivations = [
    { icon: '🔥', text: '今天的汗水，是明天的勋章。', author: '健身格言' },
    { icon: '💪', text: '成功不是将来才有的，而是从决定去做的那一刻起，持续累积而成。', author: '俞敏洪' },
    { icon: '⭐', text: '你所做的事情，也许暂时看不到成果，但不要灰心或焦虑，你不是没有成长，而是在扎根。', author: '杨绛' },
    { icon: '🏆', text: '自律的程度，决定了人生的高度。', author: '健身格言' },
    { icon: '🌟', text: '每一个优秀的人，都有一段沉默的时光。那段时光，是付出了很多努力却得不到结果的日子，我们把它叫做扎根。', author: '健身格言' },
    { icon: '🎯', text: '与其向往，不如出发。', author: '健身格言' },
    { icon: '🌈', text: '坚持到底，胜利就在前方！', author: '健身格言' },
    { icon: '⚡', text: '你的身体是你唯一的交通工具，好好保养它。', author: '健身格言' }
  ];
  
  const randMotiv = motivations[Math.floor(Math.random() * motivations.length)];
  document.getElementById('motivIcon').textContent = randMotiv.icon;
  document.getElementById('motivText').textContent = randMotiv.text;
  document.getElementById('motivAuthor').textContent = randMotiv.author;
})();
</script>
</body>
</html>
